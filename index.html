<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <title>Mason Chen — Interactive Portfolio</title>
    <meta name="description" content="Mason Chen's portfolio — an interactive 3D terminal built with Three.js. Explore engineering projects, MakerWorld designs, and GitHub code." />
    <meta name="author" content="Mason Chen" />
    <meta name="keywords" content="Mason Chen, portfolio, robotics, 3D printing, MakerWorld, engineering, interactive, Three.js" />
    <link rel="canonical" href="https://masn.studio" />

    <!-- Open Graph / Social previews -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://masn.studio" />
    <meta property="og:title" content="Mason Chen — Interactive Portfolio" />
    <meta property="og:description" content="An interactive 3D terminal portfolio. Click the letters, explore the links." />
    <meta property="og:image" content="https://masn.studio/og-preview.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Mason Chen — Interactive Portfolio" />
    <meta name="twitter:description" content="An interactive 3D terminal portfolio. Click the letters, explore the links." />
    <meta name="twitter:image" content="https://masn.studio/og-preview.png" />
  </head>
  <body>
    <!-- Rotation root: rotated 90deg on portrait devices to force landscape -->
    <div id="rotation-root">
      <!-- Background CRT particle grain and ASCII trail canvas -->
      <canvas id="bg-canvas"></canvas>

      <!-- Custom Snapping Block Cursor -->
      <div id="terminal-cursor"></div>

      <!-- Master Viewport Container -->
      <div id="app-viewport">
      <div id="scroll-wrapper">
        
        <!-- STAGE 1: THE COMMAND -->
        <section id="stage-1" class="stage">
          <div class="stage-content">
            <h1 class="command-line" aria-label="% whoami">
              <span class="prompt-char">%</span><span class="space-char">&nbsp;</span><span id="typewriter-text"></span>
            </h1>
          </div>
        </section>

        <!-- STAGE 2: THE OUTPUT -->
        <section id="stage-2" class="stage">
          <div class="stage-content">
            <!-- Accessible off-screen title -->
            <h2 class="sr-only">Mason Chen</h2>
            
            <!-- Three.js Canvas for 3D tactile letters of MASON CHEN -->
            <div id="three-canvas-container"></div>
            
            <!-- Stage 2 Links: terminal-style listing mapped onto grid rows 5-6 -->
            <div class="links-line">
              <div class="link-wrapper row-5 col-a">
                <a href="https://github.com/Mason363" target="_blank" rel="noopener noreferrer" class="terminal-link" data-link="github"><span class="link-prefix">&gt;&nbsp;</span>github</a>
              </div>
              <div class="link-wrapper row-5 col-b">
                <a href="https://makerworld.com/en/@roboting" target="_blank" rel="noopener noreferrer" class="terminal-link" data-link="makerworld"><span class="link-prefix">&gt;&nbsp;</span>makerworld</a>
              </div>
              <div class="link-wrapper row-5 col-c">
                <a href="https://tactile.masn.studio" target="_blank" rel="noopener noreferrer" class="terminal-link" data-link="tactile"><span class="link-prefix">&gt;&nbsp;</span>tactile</a>
              </div>
              <div class="link-wrapper row-6 col-a">
                <a href="https://pathstitch.masn.studio" target="_blank" rel="noopener noreferrer" class="terminal-link" data-link="pathstitch"><span class="link-prefix">&gt;&nbsp;</span>pathstitch</a>
              </div>
              <div class="link-wrapper row-6 col-b">
                <a href="https://contour.masn.studio" target="_blank" rel="noopener noreferrer" class="terminal-link" data-link="contour"><span class="link-prefix">&gt;&nbsp;</span>contour</a>
              </div>
              <div class="link-wrapper row-6 col-c">
                <a href="https://planar.masn.studio" target="_blank" rel="noopener noreferrer" class="terminal-link" data-link="planar"><span class="link-prefix">&gt;&nbsp;</span>planar</a>
              </div>
            </div>
          </div>
        </section>

        </div>
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
