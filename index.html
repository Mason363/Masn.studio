<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <title>Mason Chen | Portfolio</title>
    <meta name="description" content="Mason Chen - Interactive 3D Terminal Portfolio. Explore creative engineering, MakerWorld designs, and GitHub code." />
  </head>
  <body>
    <!-- Rotation root: rotated 90deg on portrait devices to force landscape -->
    <div id="rotation-root">
      <!-- Background CRT particle grain and ASCII trail canvas -->
      <canvas id="bg-canvas"></canvas>

      <!-- Custom Snapping Block Cursor -->
      <div id="terminal-cursor"></div>

      <!-- Master Viewport Container -->
      <div id="app-viewport">
      <div id="scroll-wrapper">
        
        <!-- STAGE 1: THE COMMAND -->
        <section id="stage-1" class="stage">
          <div class="stage-content">
            <h1 class="command-line" aria-label="% whoami">
              <span class="prompt-char">%</span><span class="space-char">&nbsp;</span><span id="typewriter-text"></span>
            </h1>
          </div>
        </section>

        <!-- STAGE 2: THE OUTPUT -->
        <section id="stage-2" class="stage">
          <div class="stage-content">
            <!-- Accessible off-screen title -->
            <h2 class="sr-only">Mason Chen</h2>
            
            <!-- Three.js Canvas for 3D tactile letters of MASON CHEN -->
            <div id="three-canvas-container"></div>
            
            <!-- Stage 2 Links -->
            <div class="links-line">
              <div class="link-wrapper-github">
                <a href="https://github.com/Mason363" target="_blank" rel="noopener noreferrer" class="terminal-link" data-link="github">GITHUB</a>
              </div>
              <div class="link-wrapper-makerworld">
                <a href="https://makerworld.com/en/@roboting" target="_blank" rel="noopener noreferrer" class="terminal-link" data-link="makerworld">MAKERWORLD</a>
              </div>
            </div>
          </div>
        </section>

        </div>
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
